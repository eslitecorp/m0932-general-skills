name: Security Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checkov-secrets:
    name: Checkov Secrets Scan（強制）
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov secrets 掃描
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: secrets
          output_format: cli,sarif
          output_file_path: console,results-secrets.sarif
          skip_path: >-
            youtrack-report/venv,
            .git
          soft_fail: false
        env:
          LOG_LEVEL: WARNING

      - name: 確認 SARIF 存在
        if: success() || failure()
        run: |
          if [ ! -f results-secrets.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[]}' > results-secrets.sarif
          fi

      - name: 上傳 SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: results-secrets.sarif
          category: checkov-secrets

  checkov-iac:
    name: Checkov IaC Scan（警示）
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov GitHub Actions 掃描
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: github_actions
          output_format: cli,sarif
          output_file_path: console,results-iac.sarif
          skip_path: >-
            youtrack-report/venv,
            .git
          soft_fail: true
        env:
          LOG_LEVEL: WARNING

      - name: 確認 SARIF 存在
        if: success() || failure()
        run: |
          if [ ! -f results-iac.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[]}' > results-iac.sarif
          fi

      - name: 上傳 SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: results-iac.sarif
          category: checkov-iac
