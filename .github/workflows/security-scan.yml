name: Security Scan (Checkov / Cortex Cloud)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # 上傳 SARIF 到 GitHub Security tab
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://essc.xdr.sg.paloaltonetworks.com

jobs:
  checkov:
    name: Checkov IaC & Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: Checkov 資安掃描
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          # 掃描整個 repo
          directory: .
          # 掃描項目：GitHub Actions 設定 + 機密偵測 + 一般設定檔
          framework: github_actions,secrets
          # 同時輸出 CLI（顯示在 log）與 SARIF（上傳 Security tab）
          output_format: cli,sarif
          output_file_path: console,results.sarif
          # 不把 venv 等非必要目錄納入掃描
          skip_path: >-
            youtrack-report/venv,
            .git
          # soft_fail: true → 掃出問題時不阻擋 PR，僅作警示（初期建議）
          # 待團隊熟悉後可改為 false 強制阻擋
          soft_fail: true
        env:
          LOG_LEVEL: WARNING

      - name: 確認 SARIF 檔案存在
        if: success() || failure()
        run: |
          if [ ! -f results.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","runs":[]}' > results.sarif
          fi

      - name: 上傳 SARIF 至 GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: results.sarif
          category: checkov

  cortex-upload:
    name: Cortex Cloud 上傳
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 下載 Cortex CLI
        run: |
          set -ex
          # 使用 -w 取得 HTTP status code，-D- 輸出 response headers
          http_code=$(curl -s -o /tmp/crtx_resp.txt -w "%{http_code}" \
            "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Authorization: ${CORTEX_API_KEY}")
          crtx_resp=$(cat /tmp/crtx_resp.txt)
          echo "HTTP status: ${http_code}"
          echo "API response: ${crtx_resp}"

          # 非 200 表示認證失敗或 API 錯誤
          if [ "$http_code" != "200" ]; then
            echo "::error::Cortex Cloud API 回傳 HTTP ${http_code}，認證失敗或 API URL 錯誤。"
            echo "::error::請依照 .github/CORTEX_API_KEY_SETUP.md 重新建立 API Key（Security Level: Standard，Role: CLI）並更新 GitHub Secrets。"
            exit 1
          fi

          # 確認回應為 JSON 且包含 signed_url
          crtx_url=$(echo "$crtx_resp" | jq -r '.reply.signed_url // .signed_url // empty' 2>/dev/null || true)
          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "::error::Cortex Cloud API 回應中找不到 signed_url，請確認 API Key 權限。"
            echo "::error::回應內容：${crtx_resp}"
            exit 1
          fi

          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --version

      - name: Cortex CLI Code Scan 上傳
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "GITHUB_ACTIONS" \
            --create-repo-if-missing
